<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess for Creators | Elroi Macharm</title>
    <meta name="description" content="Exclusive portal for elite chess creators. Manage content, analyze growth, and connect.">
    <link rel="stylesheet" href="src/style.css">
    <style>
        #dashboard { display: none; }
        body { background-color: #050507 !important; color: white; margin: 0; padding: 0; }
    </style>
</head>
<body>
    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <!-- Login Screen -->
    <div id="login-screen" class="container">
        <div class="glass-card">
            <div class="header">
                <h1>STUDIO ACCESS</h1>
                <p>Identity Verification Required</p>
            </div>
            
            <form id="login-form">
                <div class="form-group">
                    <label for="username">CREATOR NAME</label>
                    <input type="text" id="username" placeholder="---" required autocomplete="name">
                </div>
                
                <div class="form-group">
                    <label for="password">SECURITY PASSWORD</label>
                    <input type="password" id="password" placeholder="---" required autocomplete="current-password">
                </div>

                <div class="form-group">
                    <label for="pin">PERSONAL PIN</label>
                    <input type="password" id="pin" placeholder="---" required>
                </div>

                <button type="submit" class="btn">ENTER STUDIO</button>
                <div id="login-message" class="message"></div>
            </form>
        </div>
    </div>

    <!-- Dashboard Screen -->
    <div id="dashboard" class="container" style="display: none;">
        <div class="dashboard-header">
            <div>
                <h1 style="font-weight: 800; letter-spacing: -4px;">CREATOR STUDIO</h1>
                <p style="color: var(--text-secondary); font-size: 2rem; margin-top: 1rem;">NETWORK: <a href="https://iamhimhehe2-cyber.github.io/" target="_blank" style="color: var(--accent-gold); text-decoration: none;">IAMHIMHEHE2-CYBER</a></p>
            </div>
            <div class="user-info">
                <div class="avatar">EM</div>
                <button id="logout-btn" class="btn" style="width: auto; padding: 1.5rem 3rem; font-size: 1.5rem; margin-top: 0;">LOGOUT</button>
            </div>
        </div>

        <div class="grid">
            <div class="stat-card">
                <h3>LIVE PLAYERS</h3>
                <div class="value" id="player-count">0</div>
            </div>
            <div class="stat-card">
                <h3>MATCHES</h3>
                <div class="value" id="active-matches">0</div>
            </div>
            <div class="stat-card">
                <h3>STATUS</h3>
                <div class="value" style="font-size: 5rem;">ACTIVE</div>
            </div>
        </div>

        <div class="grid" style="margin-top: 5rem;">
            <div class="glass-card" style="padding: 5rem; grid-column: span 2;">
                <h2 style="font-size: 3.5rem; margin-bottom: 3rem; border-bottom: 4px solid var(--glass-border); padding-bottom: 2rem;">SYSTEM CONTROL</h2>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 5rem;">
                    <div>
                        <h4 style="color: var(--accent-gold); font-size: 2.2rem; margin-bottom: 2rem;">CORE NODE</h4>
                        <p style="color: var(--text-secondary); font-size: 1.8rem; margin-bottom: 1.5rem;">STATUS: 🟢 SECURE</p>
                        <button class="btn" style="padding: 1.5rem; font-size: 1.5rem;">REFRESH DATA</button>
                    </div>
                    <div>
                        <h4 style="color: var(--accent-gold); font-size: 2.2rem; margin-bottom: 2rem;">COMMANDS</h4>
                        <ul style="list-style: none; color: var(--text-secondary); font-size: 1.8rem;">
                            <li style="margin-bottom: 1.5rem;">• GLOBAL UPDATE</li>
                            <li style="margin-bottom: 1.5rem;">• CLEAR CACHE</li>
                        </ul>
                    </div>
                </div>
            </div>
            <div class="glass-card" style="padding: 5rem; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;">
                <h2 style="font-size: 3rem; margin-bottom: 2.5rem;">BROADCAST</h2>
                <button class="btn" style="background: linear-gradient(135deg, #ff416c, #ff4b2b); color: white; padding: 2.5rem; font-size: 2.5rem;">GO LIVE</button>
            </div>
        </div>
    </div>

    <script type="module" src="src/main.js"></script>
</body>
</html>
